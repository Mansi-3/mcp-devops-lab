apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
      - name: auth
        image: local-auth-service:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: mcp-gateway
spec:
  selector:
    app: auth
  ports:
  - port: 80
    targetPort: 3000