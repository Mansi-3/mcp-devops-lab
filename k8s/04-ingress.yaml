apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mcp-gateway-ingress
  namespace: mcp-gateway
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /verify
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 80
      - path: /generate
        pathType: Prefix
        backend:
          service:
            name: model-service
            port:
              number: 80