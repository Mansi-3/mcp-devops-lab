apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-service
  namespace: mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: model
  template:
    metadata:
      labels:
        app: model
    spec:
      containers:
      - name: model
        image: local-model-service:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: model-service
  namespace: mcp-gateway
spec:
  selector:
    app: model
  ports:
  - port: 80
    targetPort: 8000